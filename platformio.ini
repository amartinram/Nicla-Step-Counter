[env]
platform = nordicnrf52
board = nicla_sense_me
framework = arduino
monitor_speed = 115200
monitor_port = /dev/ttyACM0
build_flags = -I include
lib_deps = 
    arduino-libraries/ArduinoBLE @ ^1.3.6
    arduino-libraries/Arduino_BHY2 @ ^1.0.8

[env:production]
build_src_filter = +<*.cpp> -<mainProb.cpp>

[env:testing]
build_src_filter = +<*.cpp> -<main.cpp>